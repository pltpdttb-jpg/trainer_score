<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb Certification - Trainer Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',      
                        brandNavy: '#0F172A',    
                        surface: '#F8FAFC',      
                        danger: '#EF4444',
                        success: '#10B981',
                        warning: '#F59E0B',
                        purple: '#8B5CF6'
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        slideUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: 0, transform: 'scale(0.95)' }, '100%': { opacity: 1, transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #F8FAFC; font-family: 'Nunito', 'Prompt', sans-serif; } 
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #F1F5F9; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } 
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .btn-modern { transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn-modern:active:not(:disabled) { transform: scale(0.97); }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full flex overflow-hidden"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const RH_ZONES = { 'RH1': ['จตุจักร', 'ธนบุรี', 'บางกะปิ', 'สาทร', 'สุขุมวิท'], 'RH2': ['ชลบุรี', 'บางนา', 'พัทยา', 'ระยอง'], 'RH3': ['เชียงใหม่', 'นครสวรรค์', 'นนทบุรี', 'พิษณุโลก', 'อยุธยา'], 'RH4': ['ดอนเมือง', 'นครราชสีมา', 'สระบุรี', 'อุดรธานี', 'อุบลราชธานี'], 'RH5': ['ภูเก็ต', 'ราชบุรี', 'สมุทรสาคร', 'สุราษฎร์ธานี', 'หาดใหญ่'] };

        const Icons = {
            Download: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            X: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Play: () => <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        };

        // 💡 จำลองการทำงาน EmailJS (เตรียมพร้อมผูกของจริง)
        const sendCertificateEmail = async (email, name, pkScore, pkAttempts, audioScore, audioAttempts) => {
            console.log(`📧 [SYSTEM] Preparing to send Email to: ${email}`);
            console.log(`📋 Payload: Name=${name}, PK_Score=${pkScore}, Audio_Score=${audioScore}`);
            // จำลอง Delay ส่งเมล 1 วินาที
            return new Promise(resolve => setTimeout(resolve, 1000));
            
            /* // โค้ดของจริงสำหรับ EmailJS:
            return emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
                to_email: email,
                candidate_name: name,
                pk_score: pkScore,
                pk_attempts: pkAttempts,
                audio_score: audioScore,
                audio_attempts: audioAttempts
            }, 'YOUR_PUBLIC_KEY');
            */
        };

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [user, setUser] = useState(null); 
            const [db, setDb] = useState({ users: [], sessions: {}, audioSubs: [] }); 
            const [isLoading, setIsLoading] = useState(true);

            const fetchData = async () => {
                const [resU, resS, resA] = await Promise.all([ supabase.from('users').select('*'), supabase.from('exam_sessions').select('*'), supabase.from('audio_submissions').select('*') ]);
                const sessMap = {}; if(resS.data) resS.data.forEach(s => sessMap[s.user_id] = s);
                setDb({ users: resU.data || [], sessions: sessMap, audioSubs: resA.data || [] }); 
                setIsLoading(false);
            };

            useEffect(() => { 
                const savedUser = localStorage.getItem('ttb_mgmt_user'); 
                if (savedUser) { setUser(JSON.parse(savedUser)); fetchData(); } 
                else { setIsLoading(false); } 
            }, []);
            
            const handleLogin = async (e) => { 
                e.preventDefault(); 
                setIsLoading(true);
                const empId = e.target.username.value; 
                const fName = e.target.password.value; 
                const { data } = await supabase.from('users').select('*').eq('employee_id', empId).ilike('first_name_en', fName).single(); 
                
                if (data && (data.role === 'Trainer' || data.role === 'Admin')) { 
                    setUser(data); localStorage.setItem('ttb_mgmt_user', JSON.stringify(data)); fetchData(); 
                } else { 
                    alert('Access Denied: ไม่พบข้อมูล หรือคุณไม่มีสิทธิ์เข้าใช้งาน'); 
                    setIsLoading(false);
                } 
            };

            if (isLoading) return <div className="h-screen w-full flex flex-col items-center justify-center text-primary font-bold bg-surface"><div className="w-12 h-12 border-4 border-primary/30 border-t-primary rounded-full animate-spin mb-4"></div>Loading Portal...</div>;
            
            if (!user) return (
                <div className="h-screen w-full flex items-center justify-center bg-brandNavy relative overflow-hidden">
                    <div className="absolute top-[-100px] right-[-100px] w-96 h-96 bg-primary rounded-full opacity-20 blur-3xl"></div>
                    <form onSubmit={handleLogin} className="bg-white p-8 rounded-[32px] w-[350px] shadow-2xl animate-slide-up relative z-10 border border-white/20">
                        <div className="w-16 h-16 bg-blue-50 text-primary rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">👨‍🏫</div>
                        <h2 className="text-2xl font-black mb-1 text-center text-brandNavy">Trainer Portal</h2>
                        <p className="text-xs text-slate-500 font-bold text-center mb-6 uppercase tracking-widest">Management System</p>
                        <input name="username" placeholder="Employee ID" className="w-full p-4 bg-surface border border-slate-200 rounded-2xl mb-4 font-bold text-sm outline-none focus:border-primary transition-colors" required />
                        <input type="password" name="password" placeholder="First Name (EN)" className="w-full p-4 bg-surface border border-slate-200 rounded-2xl mb-6 font-bold text-sm outline-none focus:border-primary transition-colors" required />
                        <button className="w-full bg-primary hover:bg-blue-700 text-white py-4 rounded-xl font-black transition-all btn-modern shadow-[0_8px_20px_rgba(37,99,235,0.25)] tracking-wider uppercase text-sm">เข้าสู่ระบบ</button>
                    </form>
                </div>
            );

            return (
                <div className="flex h-screen w-full bg-surface text-brandNavy">
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                        <TrainerApp trainer={user} db={db} refreshData={fetchData} onLogout={()=>{setUser(null); localStorage.removeItem('ttb_mgmt_user');}} />
                    </main>
                </div>
            );
        }

        // ==========================================
        // ADVANCED EXPORT MODAL (SheetJS)
        // ==========================================
        function ExportModal({ onClose, db }) {
            const [filter, setFilter] = useState({ startDate: '', endDate: '', rh: 'All', zone: 'All', status: 'All' });

            const handleRhChange = (e) => { setFilter({ ...filter, rh: e.target.value, zone: 'All' }); };

            const handleExport = () => {
                const candidates = db.users.filter(u => u.role === 'Candidate');
                
                // Filtering Logic
                let filteredData = candidates.filter(u => {
                    const session = db.sessions[u.id] || {};
                    const sessDate = session.updated_at ? new Date(session.updated_at).toISOString().split('T')[0] : '';
                    
                    const matchRH = filter.rh === 'All' || u.rh === filter.rh;
                    const matchZone = filter.zone === 'All' || u.zone === filter.zone;
                    const matchStatus = filter.status === 'All' || (session.overall_status || 'NOT_STARTED') === filter.status;
                    
                    let matchDate = true;
                    if (filter.startDate && sessDate) matchDate = sessDate >= filter.startDate;
                    if (filter.endDate && sessDate && matchDate) matchDate = sessDate <= filter.endDate;

                    return matchRH && matchZone && matchStatus && matchDate;
                });

                if(filteredData.length === 0) return alert("ไม่พบข้อมูลตามเงื่อนไขที่ระบุ");

                // Data Mapping for Excel
                const excelData = filteredData.map((u, i) => {
                    const sess = db.sessions[u.id] || {};
                    return {
                        "No.": i + 1,
                        "รหัสพนักงาน": u.employee_id,
                        "ชื่อ (EN)": u.first_name_en,
                        "นามสกุล (EN)": u.last_name_en || '',
                        "อีเมล": u.email || 'ไม่มีข้อมูล',
                        "ตำแหน่ง": u.position || '-',
                        "ภูมิภาค (RH)": u.rh || '-',
                        "สาขา/โซน": u.zone || '-',
                        "คะแนนทฤษฎี": sess.pk_score !== null ? `${sess.pk_score}%` : 'ยังไม่สอบ',
                        "สอบทฤษฎี (ครั้ง)": sess.pk_attempts || 0,
                        "คะแนนสัมภาษณ์": sess.trainer_score !== null ? `${sess.trainer_score}%` : 'ยังไม่ประเมิน',
                        "สอบสัมภาษณ์ (ครั้ง)": sess.trainer_attempts || 0,
                        "สถานะภาพรวม": sess.overall_status || 'NOT_STARTED',
                        "โหมดการประเมิน": sess.eval_lock_mode || 'AVAILABLE',
                        "การส่งใบเซอร์": sess.cert_sent ? 'ส่งแล้ว' : 'ยังไม่ส่ง',
                        "วันที่อัปเดตล่าสุด": sess.updated_at ? new Date(sess.updated_at).toLocaleString('th-TH') : '-'
                    };
                });

                // Generate XLSX
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Candidate Report");
                
                const fileName = `TTB_Report_${filter.rh}_${new Date().toISOString().slice(0,10)}.xlsx`;
                XLSX.writeFile(workbook, fileName);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-brandNavy/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white w-full max-w-lg rounded-[32px] shadow-2xl animate-pop-in overflow-hidden">
                        <div className="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
                            <h2 className="text-xl font-black text-brandNavy flex items-center"><Icons.Download /><span className="ml-2">Export Data Report</span></h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-danger transition-colors bg-white p-2 rounded-full shadow-sm"><Icons.X /></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Start Date</label><input type="date" value={filter.startDate} onChange={e=>setFilter({...filter, startDate: e.target.value})} className="w-full p-3 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary" /></div>
                                <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">End Date</label><input type="date" value={filter.endDate} onChange={e=>setFilter({...filter, endDate: e.target.value})} className="w-full p-3 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Region (RH)</label>
                                    <select value={filter.rh} onChange={handleRhChange} className="w-full p-3 bg-surface border border-slate-200 rounded-xl text-sm font-bold cursor-pointer outline-none focus:border-primary">
                                        <option value="All">ทุกภูมิภาค</option>
                                        {Object.keys(RH_ZONES).map(rh => <option key={rh} value={rh}>{rh}</option>)}
                                    </select>
                                </div>
                                <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Zone</label>
                                    <select value={filter.zone} onChange={e=>setFilter({...filter, zone: e.target.value})} className="w-full p-3 bg-surface border border-slate-200 rounded-xl text-sm font-bold cursor-pointer outline-none focus:border-primary" disabled={filter.rh === 'All'}>
                                        <option value="All">ทุกโซน</option>
                                        {filter.rh !== 'All' && RH_ZONES[filter.rh].map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Status</label>
                                <select value={filter.status} onChange={e=>setFilter({...filter, status: e.target.value})} className="w-full p-3 bg-surface border border-slate-200 rounded-xl text-sm font-bold cursor-pointer outline-none focus:border-primary">
                                    <option value="All">ทุกสถานะการประเมิน</option>
                                    <option value="CERTIFIED">สอบผ่านแล้ว (Certified)</option>
                                    <option value="IN_PROGRESS">รอการประเมิน (In Progress)</option>
                                    <option value="FAILED">สอบไม่ผ่าน (Failed / Retake Queue)</option>
                                    <option value="NOT_STARTED">ยังไม่เริ่ม (Not Started)</option>
                                </select>
                            </div>
                            <button onClick={handleExport} className="w-full bg-success hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-md mt-6 transition-colors flex items-center justify-center btn-modern text-sm uppercase tracking-widest">
                                ดาวน์โหลดไฟล์ Excel (XLSX)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // TRAINER DASHBOARD APP
        // ==========================================
        function TrainerApp({ trainer, db, refreshData, onLogout }) {
            const [tab, setTab] = useState('audio');
            const [showExport, setShowExport] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);

            const candidates = db.users.filter(u => u.role === 'Candidate');
            
            // จัดกลุ่มไฟล์เสียงตามพนักงาน
            const groupedAudios = {}; 
            db.audioSubs.forEach(sub => { 
                if (!groupedAudios[sub.employee_id]) groupedAudios[sub.employee_id] = []; 
                groupedAudios[sub.employee_id].push(sub); 
            });
            
            // 💡 1. Audio Queue: รอตรวจ (ผ่านทฤษฎี + ส่งไฟล์เสียงครบ + คะแนนยังว่าง + สถานะ IN_PROGRESS)
            const audioQueue = candidates.filter(c => { 
                const subs = groupedAudios[c.employee_id] || []; 
                const session = db.sessions[c.id]; 
                return session?.pk_passed && subs.length > 0 && session.trainer_score === null && session.overall_status === 'IN_PROGRESS'; 
            });

            // 💡 2. Retake Queue: รอตัดสินใจ (สอบตก หรือ โดนล็อก LIVE)
            const retakeQueue = candidates.filter(c => { 
                const session = db.sessions[c.id]; 
                return session?.overall_status === 'FAILED' || session?.eval_lock_mode === 'LIVE'; 
            });

            // =====================================
            // ฟังก์ชันตรวจข้อสอบ และ ทริกเกอร์อีเมล
            // =====================================
            const gradeAudio = async (c, score) => {
                const passed = score >= 80;
                const session = db.sessions[c.id];
                const currentAttempts = session?.trainer_attempts || 1; 
                
                let certSent = false;
                setIsProcessing(true);

                if (passed) {
                    if (c.email && c.email.trim() !== '') {
                        // 🟢 มีอีเมล -> สั่งส่งอีเมลใบเซอร์อัตโนมัติ
                        await sendCertificateEmail(c.email, c.first_name_en, session.pk_score, session.pk_attempts || 1, score, currentAttempts);
                        certSent = true;
                        alert(`✅ ประเมินผ่าน! (คะแนน ${score}%)\n\nระบบจัดส่งใบ Certificate ไปยังอีเมล: ${c.email} เรียบร้อยแล้ว`);
                    } else {
                        // 🟡 ไม่มีอีเมล -> ให้ผ่าน แต่ระบบของ Candidate จะเด้ง Pop-up ทวงเอง
                        alert(`✅ ประเมินผ่าน! (คะแนน ${score}%)\n\n⚠️ แจ้งเตือน: ไม่พบอีเมลของผู้สอบรายนี้ในระบบ\nระบบจะทำการทวงถามให้ผู้สอบกรอกอีเมลด้วยตนเองเมื่อเข้าสู่ระบบครั้งหน้า`);
                    }
                } else {
                    // 🔴 ไม่ผ่าน -> เด้งไป Retake Queue
                    alert(`❌ ไม่ผ่านเกณฑ์ (คะแนน ${score}%)\nผู้เข้าสอบถูกย้ายไปอยู่หน้าต่าง "รอพิจารณาสอบซ่อม (Retake Queue)"`);
                }

                // บันทึกสถานะทั้งหมดลง Supabase
                await supabase.from('exam_sessions').update({ 
                    trainer_score: score, 
                    trainer_passed: passed, 
                    trainer_attempts: currentAttempts, // คงจำนวนครั้งไว้
                    overall_status: passed ? 'CERTIFIED' : 'FAILED',
                    cert_sent: certSent
                }).eq('user_id', c.id);
                
                setIsProcessing(false);
                refreshData();
            };

            // =====================================
            // THE POWER OF CHOICE (ปุ่มอำนาจเทรนเนอร์)
            // =====================================
            
            // 1. ปุ่ม "อัดเสียงใหม่"
            const grantRetake = async (c) => {
                if(!window.confirm(`อนุญาตให้ ${c.first_name_en} สอบซ่อมด้วยการ "อัดเสียงใหม่"?\n\nคำเตือน: ระบบจะลบไฟล์เสียงเดิม และปลดล็อกให้พนักงานเข้าอัดเสียงชุดใหม่ได้ทันที`)) return;
                setIsProcessing(true);
                // ลบไฟล์เสียงเก่าทิ้งให้หมด
                await supabase.from('audio_submissions').delete().eq('employee_id', c.employee_id);
                // ล้างคะแนน และปลดล็อกให้ AVAILABLE
                await supabase.from('exam_sessions').update({ 
                    trainer_score: null, 
                    trainer_passed: false, 
                    overall_status: 'IN_PROGRESS', 
                    eval_lock_mode: 'AVAILABLE' 
                }).eq('user_id', c.id);
                
                alert("✅ ปลดล็อกสิทธิ์ให้อัดเสียงใหม่สำเร็จ!"); 
                setIsProcessing(false);
                refreshData();
            };

            // 2. ปุ่ม "บังคับสัมภาษณ์สด"
            const lockLiveInterview = async (c) => {
                if(!window.confirm(`เปลี่ยนวิธีการประเมินเป็น "สัมภาษณ์สด (Live Interview)"?\n\nคำเตือน: พนักงานจะถูกบล็อกไม่ให้อัดเสียงผ่านระบบ จนกว่าคุณจะสัมภาษณ์และให้คะแนนเสร็จ`)) return;
                setIsProcessing(true);
                // ล็อกโหมดเป็น LIVE
                await supabase.from('exam_sessions').update({ eval_lock_mode: 'LIVE' }).eq('user_id', c.id);
                alert("🔒 ล็อกสิทธิ์เป็นโหมดสัมภาษณ์สดเรียบร้อยแล้ว"); 
                setIsProcessing(false);
                refreshData();
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 pb-20">
                    {/* Export Modal */}
                    {showExport && <ExportModal onClose={() => setShowExport(false)} db={db} />}

                    {/* Top Navigation & Stats Bar */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 gap-4">
                        <div className="flex gap-2 flex-wrap">
                            <button onClick={() => setTab('audio')} className={`px-5 py-3 rounded-xl font-black text-sm transition-all ${tab==='audio'?'bg-primary text-white shadow-md transform scale-105':'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                                🎧 Audio Queue <span className={`ml-2 px-2 py-0.5 rounded text-[10px] ${tab==='audio'?'bg-white/20':'bg-slate-200 text-slate-600'}`}>{audioQueue.length}</span>
                            </button>
                            <button onClick={() => setTab('retake')} className={`px-5 py-3 rounded-xl font-black text-sm transition-all ${tab==='retake'?'bg-danger text-white shadow-md transform scale-105':'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                                🔄 Retake Queue <span className={`ml-2 px-2 py-0.5 rounded text-[10px] ${tab==='retake'?'bg-white/20':'bg-slate-200 text-slate-600'}`}>{retakeQueue.length}</span>
                            </button>
                        </div>
                        <div className="flex gap-3 w-full md:w-auto">
                            <button onClick={() => setShowExport(true)} className="flex-1 md:flex-none bg-emerald-50 text-success border border-emerald-200 px-5 py-3 rounded-xl font-extrabold text-sm flex items-center justify-center hover:bg-emerald-100 transition-colors btn-modern shadow-sm">
                                <Icons.Download /> <span className="ml-2 uppercase tracking-widest">Export Report</span>
                            </button>
                            <button onClick={onLogout} className="bg-white text-danger border border-slate-200 px-5 py-3 rounded-xl font-extrabold text-sm hover:bg-red-50 transition-colors btn-modern shadow-sm">
                                Logout
                            </button>
                        </div>
                    </div>

                    {isProcessing && <div className="bg-primary/10 text-primary p-3 rounded-xl text-center font-bold text-sm animate-pulse border border-primary/20">⏳ กำลังประมวลผลข้อมูล... โปรดรอสักครู่</div>}

                    {/* ==========================================
                        TAB 1: AUDIO QUEUE
                    ========================================== */}
                    {tab === 'audio' && (
                        <div className="glass-card p-6 animate-fade-in border-t-4 border-t-primary">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black text-brandNavy">Pending Evaluation <span className="text-sm font-bold text-slate-400 ml-2">(รอการตรวจประเมิน)</span></h2>
                            </div>
                            
                            {audioQueue.length === 0 ? (
                                <div className="text-center py-16 bg-slate-50 rounded-[24px] border-2 border-dashed border-slate-200">
                                    <div className="text-5xl mb-3 opacity-50">🎧</div>
                                    <p className="text-slate-400 font-bold">ยอดเยี่ยม! ไม่มีคิวรอการประเมินในขณะนี้</p>
                                </div>
                            ) : audioQueue.map(c => {
                                const session = db.sessions[c.id];
                                const audios = groupedAudios[c.employee_id] || [];
                                return (
                                <div key={c.id} className="border border-slate-200 p-6 rounded-[24px] mb-5 bg-white shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-1">
                                                <p className="font-extrabold text-xl text-brandNavy">{c.first_name_en} {c.last_name_en}</p>
                                                {!c.email && <span className="bg-warning/20 text-warning text-[9px] px-2 py-1 rounded font-black uppercase tracking-widest border border-warning/30">No Email</span>}
                                            </div>
                                            <div className="text-xs font-bold text-slate-500 flex flex-wrap gap-3 mb-4">
                                                <span className="bg-slate-100 px-2 py-1 rounded"><span className="text-slate-400">ID:</span> {c.employee_id}</span>
                                                <span className="bg-slate-100 px-2 py-1 rounded"><span className="text-slate-400">RH:</span> {c.rh} ({c.zone})</span>
                                                <span className="bg-blue-50 text-primary px-2 py-1 rounded border border-blue-100">คะแนนทฤษฎี: {session?.pk_score}%</span>
                                                <span className="bg-orange-50 text-warning px-2 py-1 rounded border border-orange-100">รอบที่ประเมิน: {session?.trainer_attempts || 1}</span>
                                            </div>
                                            
                                            {/* Player List */}
                                            <div className="space-y-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recorded Answers ({audios.length}/3)</p>
                                                {audios.map((a, i) => (
                                                    <div key={i} className="flex flex-col sm:flex-row sm:items-center gap-3">
                                                        <span className="text-[10px] font-black bg-white px-2 py-1 rounded shadow-sm border border-slate-200 shrink-0 min-w-[70px] text-center">{a.category.split(' ')[0]}</span>
                                                        <audio controls src={a.audio_url} className="h-8 w-full outline-none"></audio>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex flex-row md:flex-col gap-2 shrink-0 md:w-40">
                                            <button onClick={() => gradeAudio(c, 85)} disabled={isProcessing} className="w-full bg-success hover:bg-emerald-600 text-white py-3.5 rounded-xl text-sm font-black transition-colors shadow-sm btn-modern disabled:opacity-50">ให้ผ่าน (85%)</button>
                                            <button onClick={() => gradeAudio(c, 60)} disabled={isProcessing} className="w-full bg-white hover:bg-red-50 text-danger border-2 border-danger py-3 rounded-xl text-sm font-black transition-colors shadow-sm btn-modern disabled:opacity-50">ไม่ผ่าน (60%)</button>
                                            <button onClick={() => lockLiveInterview(c)} disabled={isProcessing} className="w-full mt-2 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-xl text-[10px] font-black transition-colors btn-modern disabled:opacity-50 uppercase tracking-widest">ดึงมาสัมภาษณ์สด</button>
                                        </div>
                                    </div>
                                </div>
                            )})}
                        </div>
                    )}

                    {/* ==========================================
                        TAB 2: RETAKE QUEUE
                    ========================================== */}
                    {tab === 'retake' && (
                        <div className="glass-card p-6 border-t-4 border-t-danger animate-fade-in bg-red-50/10">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black text-danger">Retake & Live Queue <span className="text-sm font-bold text-slate-400 ml-2">(รอการพิจารณา)</span></h2>
                            </div>

                            {retakeQueue.length === 0 ? (
                                <div className="text-center py-16 bg-white rounded-[24px] border-2 border-dashed border-red-100 shadow-sm">
                                    <div className="text-5xl mb-3 opacity-50">🎉</div>
                                    <p className="text-red-400 font-bold">ไม่มีพนักงานตกค้างในคิวสอบซ่อม</p>
                                </div>
                            ) : retakeQueue.map(c => {
                                const session = db.sessions[c.id];
                                const isLive = session?.eval_lock_mode === 'LIVE';
                                return(
                                <div key={c.id} className={`border p-6 rounded-[24px] mb-5 flex flex-col md:flex-row justify-between md:items-center shadow-sm hover:shadow-md transition-colors gap-4 ${isLive ? 'bg-blue-50/50 border-blue-200' : 'bg-white border-red-200'}`}>
                                    <div>
                                        <div className="flex items-center gap-3">
                                            <p className={`font-extrabold text-xl ${isLive ? 'text-blue-900' : 'text-red-900'}`}>{c.first_name_en} {c.last_name_en}</p>
                                            {isLive && <span className="bg-blue-600 text-white text-[10px] px-2 py-1 rounded font-black uppercase tracking-widest flex items-center shadow-sm">🔒 Live Mode</span>}
                                        </div>
                                        <p className="text-xs font-bold text-slate-500 mt-2 flex gap-3">
                                            <span>ID: {c.employee_id}</span>
                                            <span>|</span>
                                            <span className={isLive ? 'text-blue-700' : 'text-red-600'}>
                                                คะแนนรอบที่แล้ว: <span className="text-sm">{session?.trainer_score !== null ? session.trainer_score + '%' : 'N/A'}</span>
                                            </span>
                                        </p>
                                        <p className="text-[11px] font-bold text-slate-400 mt-1">ใช้สิทธิ์สอบไปแล้ว: <span className="text-slate-600">{session?.trainer_attempts}</span> รอบ</p>
                                    </div>
                                    <div className="flex flex-wrap md:flex-nowrap gap-2 md:w-auto w-full">
                                        {/* ถ้าเป็นโหมด Live จะมีปุ่มให้คะแนนสดได้เลย (แถมให้) */}
                                        {isLive ? (
                                            <div className="flex gap-2 w-full">
                                                <button onClick={() => gradeAudio(c, 85)} disabled={isProcessing} className="flex-1 bg-success hover:bg-emerald-600 text-white px-4 py-3 rounded-xl text-xs font-black transition-colors shadow-sm btn-modern disabled:opacity-50">ให้ผ่านทันที (Live)</button>
                                                <button onClick={() => grantRetake(c)} disabled={isProcessing} className="flex-1 bg-white border border-slate-300 text-slate-600 px-4 py-3 rounded-xl text-xs font-black hover:bg-slate-50 transition-colors shadow-sm btn-modern disabled:opacity-50">ปลดล็อกกลับไปอัดเสียง</button>
                                            </div>
                                        ) : (
                                            <div className="flex gap-2 w-full">
                                                {/* THE POWER OF CHOICE: 2 ทางเลือกในการลงดาบ */}
                                                <button onClick={() => grantRetake(c)} disabled={isProcessing} className="flex-1 bg-white border-2 border-success text-success px-4 py-3 rounded-xl text-[13px] font-black hover:bg-success hover:text-white transition-colors shadow-sm btn-modern disabled:opacity-50">อัดเสียงใหม่ (Audio)</button>
                                                <button onClick={() => lockLiveInterview(c)} disabled={isProcessing} className="flex-1 bg-white border-2 border-primary text-primary px-4 py-3 rounded-xl text-[13px] font-black hover:bg-primary hover:text-white transition-colors shadow-sm btn-modern disabled:opacity-50">บังคับสัมภาษณ์สด (Live)</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )})}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
