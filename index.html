        };

        const sendCertificateEmail = async (email, name, pkScore, pkAttempts, audioScore, audioAttempts) => {
            console.log(`📧 [SYSTEM] กำลังจำลองส่งอีเมลไปยัง: ${email}`);
            return new Promise(resolve => setTimeout(resolve, 1500));
        };

        const groupBy = (array, keyFn) => array.reduce((result, item) => { const key = keyFn(item); if (!result[key]) result[key] = []; result[key].push(item); return result; }, {});
        
        const formatThaiDateTime = (dateString) => {
            if (!dateString) return "-";
            return new Date(dateString).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' น.';
        };

        // ==========================================
        // ERROR BOUNDARY
        // ==========================================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error) { console.error(error); }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen bg-surface flex items-center justify-center p-6">
                        <div className="bg-white p-8 rounded-[24px] shadow-card max-w-lg w-full text-center border-t-4 border-danger">
                            <Icons.Alert className="w-12 h-12 text-danger mx-auto mb-4"/>
                            <h2 className="text-xl font-black text-brandNavy mb-2">System Error</h2>
                            <p className="text-sm font-bold text-slate-500 mb-6">เกิดข้อผิดพลาดในการแสดงผล กรุณาโหลดหน้าจอใหม่</p>
                            <button onClick={() => window.location.reload()} className="bg-primary text-white py-3 px-6 rounded-xl font-bold w-full btn-press">Reload Portal</button>
                        </div>
                    </div>
                );
                return this.props.children; 
            }
        }

        // ==========================================
        // APP ENTRY & LOGIN
        // ==========================================
        function App() {
            const [user, setUser] = useState(null); 
            const [db, setDb] = useState({ users: [], sessions: {}, audioSubs: [] }); 
            const [isLoading, setIsLoading] = useState(true);

            const fetchData = async () => {
                try {
                    const [resU, resS, resA] = await Promise.all([ 
                        supabase.from('users').select('*'), 
                        supabase.from('exam_sessions').select('*'), 
                        supabase.from('audio_submissions').select('*') 
                    ]);
                    const sessMap = {}; if(resS.data) resS.data.forEach(s => sessMap[s.user_id] = s);
                    setDb({ users: resU.data || [], sessions: sessMap, audioSubs: resA.data || [] }); 
                } catch (error) { console.error(error); } finally { setIsLoading(false); }
            };

            useEffect(() => { 
                const saved = localStorage.getItem('ttb_mgmt_user'); 
                if (saved) { setUser(JSON.parse(saved)); fetchData(); } else setIsLoading(false);
            }, []);
            
            const handleLogin = async (e) => { 
                e.preventDefault(); setIsLoading(true);
                try {
                    const { data } = await supabase.from('users').select('*').eq('employee_id', e.target.username.value).ilike('first_name_en', e.target.password.value).maybeSingle(); 
                    if (data && (data.role === 'Trainer' || data.role === 'Admin')) { 
                        setUser(data); localStorage.setItem('ttb_mgmt_user', JSON.stringify(data)); await fetchData(); 
                    } else { alert('Access Denied: ไม่พบข้อมูล หรือไม่มีสิทธิ์เข้าถึง'); setIsLoading(false); }
                } catch(err) { alert('Connection Error'); setIsLoading(false); }
            };

            if (isLoading) return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-surface">
                    <div className="w-12 h-12 border-4 border-blue-100 border-t-primary rounded-full animate-spin mb-4"></div>
                    <p className="text-primary font-bold tracking-widest uppercase text-xs">Loading Portal...</p>
                </div>
            );
            
            if (!user) return (
                <div className="h-screen w-full flex items-center justify-center bg-surface p-4 relative overflow-hidden">
                    <div className="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px]"></div>
                    
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[32px] w-full max-w-sm shadow-card animate-slide-up relative z-10 border border-slate-100">
                        <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-primary mx-auto mb-6 shadow-inner"><Icons.Dashboard className="w-8 h-8"/></div>
                        <h2 className="text-2xl font-black mb-1 text-center text-brandNavy">Trainer Portal</h2>
                        <p className="text-center text-slate-500 text-xs font-bold uppercase tracking-widest mb-8">Management System</p>
                        
                        <div className="space-y-4 mb-8">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">Employee ID</label>
                                <input name="username" placeholder="e.g. 000123" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm text-brandNavy outline-none focus:border-primary focus:bg-white transition-all" required />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block ml-1">First Name (EN)</label>
                                <input type="password" name="password" placeholder="e.g. Somchai" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm text-brandNavy outline-none focus:border-primary focus:bg-white transition-all" required />
                            </div>
                        </div>
                        <button className="w-full bg-primary hover:bg-blue-700 text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase transition-colors shadow-soft btn-press">Sign In</button>
                    </form>
                </div>
            );

            return <MainLayout trainer={user} db={db} refreshData={fetchData} onLogout={()=>{setUser(null); localStorage.removeItem('ttb_mgmt_user');}} />;
        }

        // ==========================================
        // EXPORT MODAL 
        // ==========================================
        function ExportModal({ onClose, db }) {
            const [filter, setFilter] = useState({ startDate: '', endDate: '', rh: 'All', zone: 'All', status: 'All' });

            const handleExport = () => {
                const candidates = db.users.filter(u => u.role === 'Candidate');
                let filteredData = candidates.filter(u => {
                    const session = db.sessions[u.id] || {};
                    const sessDate = session.updated_at ? new Date(session.updated_at).toISOString().split('T')[0] : '';
                    return (filter.rh === 'All' || u.rh === filter.rh) && (filter.zone === 'All' || u.zone === filter.zone) &&
                           (filter.status === 'All' || (session.overall_status || 'NOT_STARTED') === filter.status) &&
                           (!filter.startDate || sessDate >= filter.startDate) && (!filter.endDate || sessDate <= filter.endDate);
                });
                if(filteredData.length === 0) return alert("ไม่พบข้อมูลตามเงื่อนไข");

                const excelData = filteredData.map((u, i) => {
                    const s = db.sessions[u.id] || {};
                    return { "No": i+1, "EmpID": u.employee_id, "Name": `${u.first_name_en} ${u.last_name_en||''}`, "RH": u.rh, "Zone": u.zone, "Theory Score": s.pk_score!==null?`${s.pk_score}%`:'-', "Audio Score": s.trainer_score!==null?`${s.trainer_score}%`:'-', "Status": s.overall_status||'NOT_STARTED', "Update Date": s.updated_at?new Date(s.updated_at).toLocaleDateString('th-TH'):'-' };
                });

                const ws = XLSX.utils.json_to_sheet(excelData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report");
                XLSX.writeFile(wb, `TTB_Report_${filter.rh}_${new Date().toISOString().slice(0,10)}.xlsx`); onClose();
            };

            return (
                <div className="fixed inset-0 bg-brandNavy/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white w-full max-w-lg rounded-[32px] shadow-card animate-pop-in overflow-hidden border border-slate-100">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-surface">
                            <h2 className="text-lg font-black flex items-center text-brandNavy"><Icons.Export className="w-5 h-5 text-primary mr-2"/> Export Custom Report</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-danger"><Icons.X className="w-6 h-6"/></button>
                        </div>
                        <div className="p-8 space-y-5">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-black text-slate-500 uppercase mb-1.5 block">Start Date</label><input type="date" value={filter.startDate} onChange={e=>setFilter({...filter, startDate:e.target.value})} className="w-full p-3.5 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary" /></div>
                                <div><label className="text-[10px] font-black text-slate-500 uppercase mb-1.5 block">End Date</label><input type="date" value={filter.endDate} onChange={e=>setFilter({...filter, endDate:e.target.value})} className="w-full p-3.5 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-black text-slate-500 uppercase mb-1.5 block">Region (RH)</label><select value={filter.rh} onChange={e=>setFilter({...filter, rh:e.target.value, zone:'All'})} className="w-full p-3.5 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary"><option value="All">ทั้งหมด</option>{Object.keys(RH_ZONES).map(r=><option key={r} value={r}>{r}</option>)}</select></div>
                                <div><label className="text-[10px] font-black text-slate-500 uppercase mb-1.5 block">Zone</label><select value={filter.zone} onChange={e=>setFilter({...filter, zone:e.target.value})} className="w-full p-3.5 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary" disabled={filter.rh==='All'}><option value="All">ทั้งหมด</option>{filter.rh!=='All'&&RH_ZONES[filter.rh].map(z=><option key={z} value={z}>{z}</option>)}</select></div>
                            </div>
                            <div><label className="text-[10px] font-black text-slate-500 uppercase mb-1.5 block">Status</label><select value={filter.status} onChange={e=>setFilter({...filter, status:e.target.value})} className="w-full p-3.5 bg-surface border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-primary"><option value="All">ทั้งหมด</option><option value="CERTIFIED">Certified (ผ่าน)</option><option value="IN_PROGRESS">In Progress (รอตรวจ)</option><option value="FAILED">Failed (สอบตก/รอซ่อม)</option></select></div>
                            <button onClick={handleExport} className="w-full bg-primary text-white font-black py-4 rounded-xl shadow-soft mt-4 transition-all btn-press text-sm uppercase tracking-wider">Download Excel (.xlsx)</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // EVALUATION VIEW (1-10 Scoring & Cross-RH Warning)
        // ==========================================
        function EvaluationView({ candidate, db, trainer, onBack, gradeAudio, grantRetake, lockLiveInterview }) {
            const session = db.sessions[candidate.id];
            const isRetake = session?.overall_status === 'FAILED';
            
            // 💡 แก้ไขข้อ 1: กรองเอาเฉพาะ "ไฟล์ล่าสุด" ของแต่ละหมวดหมู่ (สูงสุด 3 ไฟล์) เพื่อป้องกันไฟล์ขยะ/ไฟล์ค้าง
            const allAudios = db.audioSubs
                .filter(s => s.employee_id === candidate.employee_id)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // เรียงจากใหม่สุดไปเก่าสุด
                
            const latestAudiosMap = {};
            allAudios.forEach(audio => {
                // เก็บเฉพาะไฟล์แรก (ที่ใหม่ที่สุด) ของแต่ละ Category
                if (!latestAudiosMap[audio.category]) {
                    latestAudiosMap[audio.category] = audio;
                }
            });
            
            // นำกลับมาเป็น Array และเรียงตามเวลาเก่าไปใหม่เพื่อแสดงผลเรียงข้อ
            const audios = Object.values(latestAudiosMap).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            
            const [itemScores, setItemScores] = useState({});
            const [crossRHConfirmed, setCrossRHConfirmed] = useState(trainer.rh === candidate.rh);

            // Logic: 3 items, 1-10 each. Total = sum. Percent = (Total / 30) * 100
            const allScored = audios.length > 0 && audios.every((_, i) => itemScores[i] !== undefined && itemScores[i] !== '');
            const totalScore = audios.reduce((sum, _, i) => sum + (parseInt(itemScores[i]) || 0), 0);
            const percentScore = audios.length > 0 ? Math.round((totalScore / (audios.length * 10)) * 100) : 0;

            const handleGrade = () => {
                if (!allScored) return alert('⚠️ กรุณาระบุคะแนนให้ครบทุกข้อ (1-10)');
                const isPass = percentScore >= 80;
                let msg = `คุณต้องการให้คะแนน ${totalScore}/${audios.length * 10} (คิดเป็น ${percentScore}%)\n`;
                msg += isPass ? "ยืนยันผลการประเมินหรือไม่?" : "ซึ่งไม่ผ่านเกณฑ์ ยืนยันผลการประเมินหรือไม่?";
                
                if (confirm(msg)) {
                    gradeAudio(candidate, percentScore); // Send percentage to DB
                }
            };

            // Cross-RH Warning Modal
            if (!crossRHConfirmed) {
                return (
                    <div className="absolute inset-0 bg-brandNavy/60 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-fade-in">
                        <div className="bg-white rounded-[24px] p-8 max-w-sm w-full shadow-card text-center border-t-4 border-warning">
                            <Icons.Alert className="w-16 h-16 text-warning mx-auto mb-4" />
                            <h2 className="text-xl font-black text-brandNavy mb-2">คำเตือน: ประเมินข้ามเขต</h2>
                            <p className="text-sm font-bold text-slate-500 mb-6 leading-relaxed">
                                ผู้เข้าสอบรายนี้อยู่ในเขต <b>{candidate.rh}</b><br/>ซึ่งอยู่นอกเหนือพื้นที่รับผิดชอบของคุณ ({trainer.rh})<br/><br/>
                                <span className="text-xs">หากกดยืนยัน ระบบจะบันทึก Log และส่งแจ้งเตือนไปยัง Trainer เจ้าของพื้นที่</span>
                            </p>
                            <div className="flex gap-3">
                                <button onClick={onBack} className="w-1/2 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl btn-press">ยกเลิก</button>
                                <button onClick={() => setCrossRHConfirmed(true)} className="w-1/2 bg-warning text-white font-black py-3 rounded-xl btn-press shadow-sm">ยืนยันตรวจ</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="animate-slide-up w-full max-w-3xl mx-auto pb-32">
                    <div className="flex items-center justify-between mb-6">
                        <button onClick={onBack} className="flex items-center text-slate-500 hover:text-primary font-bold btn-press bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100"><Icons.ChevronLeft className="w-4 h-4 mr-1"/> กลับ</button>
                    </div>

                    <div className="bg-white rounded-[24px] p-6 md:p-8 border border-slate-100 shadow-sm mb-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div className="flex items-center">
                            <div className="w-16 h-16 bg-blue-50 text-primary rounded-[20px] flex items-center justify-center text-2xl font-black mr-5 border border-blue-100">{candidate.first_name_en.charAt(0)}</div>
                            <div>
                                <h1 className="text-2xl font-black text-brandNavy">{candidate.first_name_en} {candidate.last_name_en}</h1>
                                <p className="text-slate-500 font-bold text-xs mt-1">ID: {candidate.employee_id} <span className="mx-2 text-slate-300">|</span> <span className="text-primary">{candidate.rh} ({candidate.zone})</span></p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <div className="bg-surface px-4 py-2 rounded-xl border border-slate-200 text-center"><p className="text-[10px] font-black text-slate-400 uppercase">ทฤษฎี</p><p className="text-lg font-black text-brandNavy">{session?.pk_score}%</p></div>
                            <div className="bg-orange-50 px-4 py-2 rounded-xl border border-orange-100 text-center"><p className="text-[10px] font-black text-orange-400 uppercase">รอบที่</p><p className="text-lg font-black text-orange-600">#{session?.trainer_attempts || 1}</p></div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {audios.length === 0 ? (
                            <div className="bg-white rounded-[24px] p-12 text-center text-slate-400 border border-slate-100 font-bold">ไม่พบข้อมูลไฟล์เสียง</div>
                        ) : audios.map((sub, idx) => (
                            <div key={idx} className="bg-white rounded-[24px] p-6 md:p-8 shadow-sm border border-slate-100 relative">
                                <div className="flex justify-between items-center mb-4 border-b border-slate-50 pb-4">
                                    <span className="bg-brandNavy text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-sm">{sub.category}</span>
                                    <span className="text-[10px] font-bold text-slate-400 flex items-center"><Icons.Clock className="w-3.5 h-3.5 mr-1"/> {formatThaiDateTime(sub.created_at)}</span>
                                </div>
                                <p className="font-bold text-brandNavy text-sm mb-5 bg-surface p-4 rounded-xl">{sub.question}</p>
                                {sub.audio_url ? <audio controls src={sub.audio_url} className="w-full h-10 mb-5 outline-none"/> : <div className="p-3 bg-red-50 text-danger rounded-lg text-xs font-bold mb-5">⚠️ Audio missing</div>}
                                
                                <div className="bg-surface p-4 rounded-xl border border-slate-200 mb-6">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Transcript</span>
                                        <button onClick={()=>{navigator.clipboard.writeText(sub.transcript); alert('Copied!');}} className="text-primary text-[10px] font-black uppercase tracking-widest flex items-center bg-blue-50 px-2 py-1 rounded-md btn-press"><Icons.Copy className="w-3 h-3 mr-1"/> Copy</button>
                                    </div>
                                    <p className="text-xs font-bold text-slate-600 leading-relaxed italic">"{sub.transcript}"</p>
                                </div>

                                {!isRetake && (
                                    <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100 flex items-center justify-between">
                                        <p className="font-black text-brandNavy text-sm">ให้คะแนนข้อนี้ (1-10)</p>
                                        <input type="number" min="1" max="10" value={itemScores[idx] || ''} onChange={e=>setItemScores({...itemScores, [idx]:e.target.value})} className="w-20 p-2.5 rounded-lg font-black text-xl text-center text-primary border border-blue-200 outline-none focus:ring-2 focus:ring-primary/20 shadow-inner bg-white" placeholder="0"/>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {isRetake && (
                        <div className="bg-red-50 border border-red-200 p-8 rounded-[24px] mt-8 text-center shadow-sm">
                            <h3 className="font-black text-xl text-danger mb-2">ผู้สอบไม่ผ่านเกณฑ์ (คะแนนเดิม {session.trainer_score}%)</h3>
                            <p className="text-xs font-bold text-red-700 mb-6">กรุณาเลือกวิธีการสอบซ่อม (Retake Routing)</p>
                            <div className="flex flex-col sm:flex-row justify-center gap-4">
                                <button onClick={()=>{grantRetake(candidate); onBack();}} className="bg-white border-2 border-danger text-danger px-6 py-3 rounded-xl font-black text-sm btn-press w-full sm:w-auto shadow-sm">ให้สิทธิ์ผู้สอบสุ่มใหม่ (Self-Retake)</button>
                                <button onClick={()=>{lockLiveInterview(candidate); onBack();}} className="bg-danger text-white px-6 py-3 rounded-xl font-black text-sm btn-press w-full sm:w-auto shadow-sm">นัดหมายสัมภาษณ์สด (Live Test)</button>
                            </div>
                        </div>
                    )}

                    {!isRetake && (
                        <div className="fixed bottom-0 left-0 md:left-64 w-full md:w-[calc(100%-16rem)] bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 md:p-6 z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                            <div className="max-w-3xl mx-auto flex items-center justify-between gap-6 pr-4 md:pr-0">
                                <div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Score</span>
                                    <div className="flex items-baseline">
                                        <span className="text-3xl font-black text-brandNavy">{totalScore}</span><span className="text-sm font-bold text-slate-400 ml-1">/ {audios.length*10}</span>
                                        <span className={`ml-3 text-lg font-black ${percentScore >= 80 ? 'text-success':'text-danger'}`}>({percentScore}%)</span>
                                    </div>
                                </div>
                                <button onClick={handleGrade} disabled={!allScored} className="bg-primary disabled:bg-slate-300 text-white py-3.5 px-8 rounded-xl font-black uppercase tracking-widest text-sm shadow-soft btn-press">Submit Result</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // LAYOUT & ROUTING (Sidebar + Content)
        // ==========================================
        function MainLayout({ trainer, db, refreshData, onLogout }) {
            const [view, setView] = useState('dashboard');
            const [selectedCandidate, setSelectedCandidate] = useState(null);
            const [showExport, setShowExport] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Data Prep
            const candidates = db.users.filter(u => u.role === 'Candidate');
            const groupedAudios = groupBy(db.audioSubs, s => s.employee_id);
            const audioQueue = candidates.filter(c => db.sessions[c.id]?.pk_passed && groupedAudios[c.employee_id]?.length > 0 && db.sessions[c.id].trainer_score === null);
            const retakeQueue = candidates.filter(c => db.sessions[c.id]?.trainer_score !== null && db.sessions[c.id]?.overall_status === 'FAILED');

            // Dashboard Stats Calculation
            const stats = useMemo(() => {
                let s = { total: candidates.length, failPK: 0, passPKNoAudio: 0, pendAudio: audioQueue.length, cert: 0, rhs: {} };
                Object.keys(RH_ZONES).forEach(r => s.rhs[r] = { total:0, failPK:0, passPKNoAudio:0, pendAudio:0, cert:0, theorySum:0, theoryCount:0, audioSum:0, audioCount:0, zones:{} });
                
                let countryTheorySum=0, countryTheoryCount=0, countryAudioSum=0, countryAudioCount=0;

                candidates.forEach(c => {
                    const sess = db.sessions[c.id] || {};
                    const rh = c.rh || 'Unknown';
                    if(!s.rhs[rh]) return; // ignore invalid RH
                    
                    s.rhs[rh].total++;
                    if (!s.rhs[rh].zones[c.zone]) s.rhs[rh].zones[c.zone] = { sum:0, count:0 };

                    // Status Logic
                    if (!sess.pk_passed) { s.failPK++; s.rhs[rh].failPK++; }
                    else if (sess.overall_status === 'CERTIFIED') { s.cert++; s.rhs[rh].cert++; }
                    else if (audioQueue.find(aq=>aq.id===c.id)) { /* pendAudio handled above */ s.rhs[rh].pendAudio++; }
                    else { s.passPKNoAudio++; s.rhs[rh].passPKNoAudio++; } // passed PK, but not submitted audio

                    // Score Logic
                    if (sess.pk_score !== null) { 
                        countryTheorySum += sess.pk_score; countryTheoryCount++; 
                        s.rhs[rh].theorySum += sess.pk_score; s.rhs[rh].theoryCount++;
                    }
                    if (sess.trainer_score !== null) { 
                        countryAudioSum += sess.trainer_score; countryAudioCount++;
                        s.rhs[rh].audioSum += sess.trainer_score; s.rhs[rh].audioCount++;
                        s.rhs[rh].zones[c.zone].sum += sess.trainer_score; s.rhs[rh].zones[c.zone].count++;
                    }
                });

                s.avgTheory = countryTheoryCount > 0 ? Math.round(countryTheorySum/countryTheoryCount) : 0;
                s.avgAudio = countryAudioCount > 0 ? Math.round(countryAudioSum/countryAudioCount) : 0;
                return s;
            }, [candidates, db.sessions, audioQueue]);

            // Actions
            const gradeAudio = async (c, scorePercent) => {
                const passed = scorePercent >= 80; const sess = db.sessions[c.id];
                const currentAttempts = sess?.trainer_attempts || 1;
                let certSent = false;
                
                if (passed) {
                    if (c.email) {
                        await sendCertificateEmail(c.email, c.first_name_en, sess.pk_score, sess.pk_attempts||1, scorePercent, currentAttempts);
                        certSent = true;
                        alert(`✅ ยืนยันผลผ่าน! (${scorePercent}%)\nจัดส่งใบ Certificate ไปยังอีเมล ${c.email} เรียบร้อยแล้ว`);
                    } else {
                        alert(`✅ ยืนยันผลผ่าน! (${scorePercent}%)\n⚠️ ไม่พบอีเมลผู้สอบ ระบบจะพักการส่งและแจ้งผู้สอบให้กรอกข้อมูลเมื่อเข้าระบบครั้งถัดไป`);
                    }
                } else {
                    // Fail -> doesn't alert here, handled by routing
                }

                await supabase.from('exam_sessions').update({ 
                    trainer_score: scorePercent, trainer_passed: passed, trainer_attempts: currentAttempts,
                    overall_status: passed ? 'CERTIFIED' : 'FAILED', cert_sent: certSent 
                }).eq('user_id', c.id);
                refreshData();
                if(passed) setView('dashboard'); // If passed go home, if failed stay on Evaluation for routing
            };

            const grantRetake = async (c) => {
                await supabase.from('audio_submissions').delete().eq('employee_id', c.employee_id);
                await supabase.from('exam_sessions').update({ trainer_score: null, trainer_passed: false, overall_status: 'IN_PROGRESS', eval_lock_mode: 'AVAILABLE' }).eq('user_id', c.id);
                alert(`ลบไฟล์เดิมและเปิดสิทธิ์สุ่มใหม่ให้ ${c.first_name_en} เรียบร้อยแล้ว`); refreshData(); setView('retake');
            };

            const lockLiveInterview = async (c) => {
                await supabase.from('exam_sessions').update({ eval_lock_mode: 'LIVE' }).eq('user_id', c.id);
                alert(`ล็อกสิทธิ์เป็นสัมภาษณ์สดเรียบร้อย`); refreshData(); setView('retake');
            };

            const changeView = (v) => { setView(v); setSelectedCandidate(null); setIsMobileMenuOpen(false); };

            // 💡 แก้ไขข้อ 2: ฟังก์ชันสำหรับจับคู่สีของแต่ละ RH (ไม่มีสีแดง, RH5 เป็นสีฟ้าอมเขียว)
            const getRhColorClass = (rh) => {
                switch(rh) {
                    case 'RH1': return 'bg-blue-100 text-blue-700 border-blue-200';
                    case 'RH2': return 'bg-emerald-100 text-emerald-700 border-emerald-200'; // เขียวมรกต
                    case 'RH3': return 'bg-purple-100 text-purple-700 border-purple-200'; // ม่วง
                    case 'RH4': return 'bg-amber-100 text-amber-700 border-amber-200'; // ส้มทอง
                    case 'RH5': return 'bg-teal-100 text-teal-700 border-teal-200'; // ฟ้าอมเขียว (Teal)
                    default: return 'bg-slate-200 text-slate-700 border-slate-300'; // สีเทา
                }
            };

            // Render Queue List
            const renderQueue = (queueType) => {
                const q = queueType === 'audio' ? audioQueue : retakeQueue;
                const grouped = groupBy(q, c => c.rh);
                return (
                    <div className="animate-fade-in pb-12">
                        <div className="mb-6"><h2 className="text-2xl font-black text-brandNavy">{queueType === 'audio' ? 'Evaluation Queue' : 'Retake Management'}</h2><p className="text-sm font-bold text-slate-500">จัดการข้อมูลผู้เข้าสอบแยกตามภูมิภาค</p></div>
                        {Object.keys(grouped).length === 0 ? (
                            <div className="bg-white p-12 rounded-[24px] text-center border border-slate-100 shadow-sm"><p className="text-slate-400 font-bold">ไม่มีข้อมูลคิวงานในขณะนี้</p></div>
                        ) : Object.keys(grouped).sort().map(rh => (
                            <div key={rh} className="mb-8">
                                <h3 className="text-sm font-black uppercase tracking-widest text-primary bg-blue-50 inline-block px-3 py-1 rounded-md mb-3">{rh}</h3>
                                <div className="bg-white rounded-[24px] border border-slate-100 shadow-sm overflow-hidden">
                                    {grouped[rh].map((c, i) => (
                                        <div key={c.id} onClick={()=>{setSelectedCandidate(c); setView('eval');}} className={`p-4 md:p-5 flex items-center justify-between hover:bg-slate-50 cursor-pointer transition-colors ${i!==grouped[rh].length-1?'border-b border-slate-100':''}`}>
                                            <div className="flex items-center gap-4">
                                                {/* 💡 แก้ไขข้อ 2: เปลี่ยน Avatar เป็นชื่อ RH และใช้สีตามที่กำหนด */}
                                                <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center font-black shadow-inner border text-[10px] md:text-xs ${getRhColorClass(c.rh)}`}>
                                                    {c.rh || 'HQ'}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-brandNavy text-sm md:text-base">{c.first_name_en} {c.last_name_en}</p>
                                                    <p className="text-[10px] md:text-xs font-bold text-slate-400 mt-0.5">ID: {c.employee_id} | {c.zone}</p>
                                                </div>
                                            </div>
                                            <button className="text-[10px] font-black uppercase tracking-widest text-primary bg-surface border border-slate-200 px-3 py-1.5 rounded-lg btn-press">Review</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            // Progress Bar Helper
            const ProgressBar = ({ s1, s2, s3, s4, total }) => {
                if(total === 0) return <div className="h-2.5 bg-slate-100 rounded-full w-full"></div>;
                return (
                    <div className="h-2.5 flex rounded-full overflow-hidden w-full bg-slate-100">
                        <div style={{width:`${(s1/total)*100}%`}} className="bg-danger" title={`Failed: ${s1}`}></div>
                        <div style={{width:`${(s2/total)*100}%`}} className="bg-orange" title={`Passed PK: ${s2}`}></div>
                        <div style={{width:`${(s3/total)*100}%`}} className="bg-warning" title={`Pending Audio: ${s3}`}></div>
                        <div style={{width:`${(s4/total)*100}%`}} className="bg-success" title={`Certified: ${s4}`}></div>
                    </div>
                );
            };

            return (
                <div className="flex h-full w-full bg-surface">
                    {showExport && <ExportModal db={db} onClose={()=>setShowExport(false)} />}
                    
                    {/* Mobile Header & Overlay Menu */}
                    <div className="md:hidden fixed top-0 w-full bg-white border-b border-slate-200 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
                        <h1 className="font-black text-brandNavy text-lg">Trainer Portal</h1>
                        <button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-brandNavy"><Icons.Menu className="w-6 h-6"/></button>
                    </div>
                    {isMobileMenuOpen && (
                        <div className="md:hidden fixed inset-0 bg-brandNavy/90 z-40 pt-16 px-4 pb-4 flex flex-col">
                            {/* 💡 แก้ไขข้อ 3: เปลี่ยนพื้นหลังการ์ดเมนูมือถือเป็นสีฟ้าอ่อนปนเทา (#F0F4F8) */}
                            <div className="bg-[#F0F4F8] rounded-2xl p-4 flex flex-col gap-2 shadow-card border border-white">
                                <button onClick={()=>changeView('dashboard')} className={`p-4 rounded-xl text-left font-bold flex items-center ${view==='dashboard'?'bg-blue-50 text-primary':'text-slate-600'}`}><Icons.Dashboard className="mr-3"/> Dashboard</button>
                                <button onClick={()=>changeView('audio')} className={`p-4 rounded-xl text-left font-bold flex items-center ${view==='audio'?'bg-blue-50 text-primary':'text-slate-600'}`}><Icons.Audio className="mr-3"/> Audio Queue ({audioQueue.length})</button>
                                <button onClick={()=>changeView('retake')} className={`p-4 rounded-xl text-left font-bold flex items-center ${view==='retake'?'bg-blue-50 text-primary':'text-slate-600'}`}><Icons.Retake className="mr-3"/> Retake Queue ({retakeQueue.length})</button>
                                <button onClick={()=>{setShowExport(true); setIsMobileMenuOpen(false);}} className="p-4 rounded-xl text-left font-bold flex items-center text-success bg-emerald-50 mt-2"><Icons.Export className="mr-3"/> Export Report</button>
                                <button onClick={onLogout} className="p-4 rounded-xl text-left font-bold flex items-center text-danger mt-auto"><Icons.LogOut className="mr-3"/> Logout</button>
                            </div>
                        </div>
                    )}

                    {/* Sidebar (Desktop/iPad) */}
                    {/* 💡 แก้ไขข้อ 3: เปลี่ยนพื้นหลัง Sidebar เป็นสีฟ้าอ่อนปนเทา (#F0F4F8) */}
                    <aside className="hidden md:flex flex-col w-64 bg-[#F0F4F8] border-r border-slate-200 h-full shrink-0 relative z-10">
                        <div className="p-6 border-b border-slate-200">
                            <h1 className="text-2xl font-black text-brandNavy mb-1">Trainer</h1>
                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Management Portal</p>
                        </div>
                        <div className="p-6">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-2">Welcome</p>
                            <div className="flex items-center gap-3 px-2 mb-6">
                                <div className="w-10 h-10 bg-primaryLight text-primary rounded-xl flex items-center justify-center font-black">{trainer.first_name_en.charAt(0)}</div>
                                <div><p className="font-bold text-brandNavy leading-tight">{trainer.first_name_en}</p><p className="text-[10px] text-slate-500 font-bold">{trainer.rh}</p></div>
                            </div>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-4">Menu</p>
                            <button onClick={()=>changeView('dashboard')} className={`w-full flex items-center px-4 py-3.5 rounded-xl transition-colors ${view==='dashboard'?'sidebar-active':'sidebar-inactive'}`}><Icons.Dashboard className="w-5 h-5 mr-3"/> Dashboard</button>
                            <button onClick={()=>changeView('audio')} className={`w-full flex items-center justify-between px-4 py-3.5 rounded-xl transition-colors ${view==='audio'?'sidebar-active':'sidebar-inactive'}`}><div className="flex items-center"><Icons.Audio className="w-5 h-5 mr-3"/> Audio Queue</div> <span className={`text-[10px] px-2 py-0.5 rounded-md ${view==='audio'?'bg-primary text-white':'bg-slate-200 text-slate-600'}`}>{audioQueue.length}</span></button>
                            <button onClick={()=>changeView('retake')} className={`w-full flex items-center justify-between px-4 py-3.5 rounded-xl transition-colors ${view==='retake'?'sidebar-active':'sidebar-inactive'}`}><div className="flex items-center"><Icons.Retake className="w-5 h-5 mr-3"/> Retake Queue</div> <span className={`text-[10px] px-2 py-0.5 rounded-md ${view==='retake'?'bg-primary text-white':'bg-slate-200 text-slate-600'}`}>{retakeQueue.length}</span></button>
                            <div className="pt-4 mt-4 border-t border-slate-100"></div>
                            <button onClick={()=>setShowExport(true)} className="w-full flex items-center px-4 py-3.5 rounded-xl text-success font-bold hover:bg-emerald-50 transition-colors"><Icons.Export className="w-5 h-5 mr-3"/> Export Report</button>
                        </nav>
                        <div className="p-4 mt-auto">
                            <button onClick={onLogout} className="w-full flex items-center px-4 py-3 rounded-xl text-danger font-bold hover:bg-red-50 transition-colors"><Icons.LogOut className="w-5 h-5 mr-3"/> Logout</button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 h-full overflow-y-auto custom-scrollbar pt-20 md:pt-0">
                        {view === 'eval' && selectedCandidate ? (
                            <div className="p-4 md:p-8"><EvaluationView candidate={selectedCandidate} db={db} trainer={trainer} onBack={()=>changeView(audioQueue.includes(selectedCandidate)?'audio':'retake')} gradeAudio={gradeAudio} grantRetake={grantRetake} lockLiveInterview={lockLiveInterview}/></div>
                        ) : (
                            <div className="p-4 md:p-8 max-w-6xl mx-auto">
                                {view === 'dashboard' && (
                                    <div className="animate-fade-in pb-12">
                                        <div className="mb-6"><h2 className="text-2xl font-black text-brandNavy">PD ttb Summary</h2><p className="text-sm font-bold text-slate-500">ภาพรวมระดับประเทศ (National Overview)</p></div>
                                        
                                        {/* National Stats */}
                                        <div className="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-100 mb-8 flex flex-col lg:flex-row gap-8 items-center">
                                            <div className="w-full lg:w-1/3 text-center lg:text-left border-b lg:border-b-0 lg:border-r border-slate-100 pb-6 lg:pb-0 lg:pr-6">
                                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Total Candidates</p>
                                                <p className="text-5xl font-black text-brandNavy">{stats.total}</p>
                                            </div>
                                            <div className="w-full lg:w-2/3">
                                                <div className="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                                    <span className="text-danger">Failed ({stats.failPK})</span><span className="text-orange">Theory ({stats.passPKNoAudio})</span>
                                                    <span className="text-warning">Audio ({stats.pendAudio})</span><span className="text-success">Certified ({stats.cert})</span>
                                                </div>
                                                <ProgressBar s1={stats.failPK} s2={stats.passPKNoAudio} s3={stats.pendAudio} s4={stats.cert} total={stats.total} />
                                                <div className="flex gap-6 mt-6 justify-center lg:justify-start">
                                                    <div><p className="text-[10px] font-black text-slate-400 uppercase">AVG Theory</p><p className="text-xl font-black text-primary">{stats.avgTheory}%</p></div>
                                                    <div><p className="text-[10px] font-black text-slate-400 uppercase">AVG Audio</p><p className="text-xl font-black text-primary">{stats.avgAudio}%</p></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mb-6"><h2 className="text-xl font-black text-brandNavy">RH Dashboard</h2><p className="text-sm font-bold text-slate-500">ภาพรวมเจาะลึกรายภูมิภาค</p></div>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                            {Object.entries(stats.rhs).sort((a,b)=>{
                                                // Rank by AVG Audio Score descending
                                                const avgA = a[1].audioCount>0 ? a[1].audioSum/a[1].audioCount : 0;
                                                const avgB = b[1].audioCount>0 ? b[1].audioSum/b[1].audioCount : 0;
                                                return avgB - avgA;
                                            }).map(([rh, data], index) => {
                                                const rhAvgTheory = data.theoryCount>0 ? Math.round(data.theorySum/data.theoryCount) : 0;
                                                const rhAvgAudio = data.audioCount>0 ? Math.round(data.audioSum/data.audioCount) : 0;
                                                return (
                                                    <div key={rh} className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100 relative">
                                                        <div className="absolute top-0 right-6 bg-blue-50 text-primary px-3 py-1 rounded-b-lg text-xs font-black shadow-sm">Rank #{index+1}</div>
                                                        <h3 className="text-lg font-black text-brandNavy mb-1">{rh}</h3>
                                                        <p className="text-xs font-bold text-slate-500 mb-4">Total: {data.total} Candidates</p>
                                                        
                                                        <ProgressBar s1={data.failPK} s2={data.passPKNoAudio} s3={data.pendAudio} s4={data.cert} total={data.total}/>
                                                        
                                                        <div className="grid grid-cols-2 gap-4 mt-6 p-4 bg-surface rounded-xl border border-slate-200">
                                                            <div className="text-center border-r border-slate-200"><p className="text-[10px] font-black text-slate-400 uppercase">Theory</p><p className="font-black text-brandNavy">{rhAvgTheory}%</p></div>
                                                            <div className="text-center"><p className="text-[10px] font-black text-slate-400 uppercase">Audio</p><p className="font-black text-brandNavy">{rhAvgAudio}%</p></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                {view === 'audio' && renderQueue('audio')}
                                {view === 'retake' && renderQueue('retake')}
                            </div>
                        )}
                        <footer className="mt-auto border-t border-slate-200 bg-white py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest shrink-0">
                            Powered by : PRU ACADEMY <span className="text-primary">[ttb training team]</span>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
